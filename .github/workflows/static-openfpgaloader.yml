name: Static binary (openFPGALoader + rp1-jtag)

on:
  push:
  pull_request:

jobs:
  build-static:
    name: static arm64
    runs-on: ubuntu-24.04-arm
    # NOTE: We do NOT use container: alpine here because JS actions
    # (checkout, upload-artifact) don't work in Alpine on ARM64 runners.
    # Instead we run the build inside docker manually.

    steps:
      - name: Checkout rp1-jtag
        uses: actions/checkout@v4

      - name: Build static openFPGALoader in Alpine container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -w /work \
            alpine:latest sh -c '
              set -ex

              # Install build dependencies
              apk add --no-cache \
                build-base cmake git python3 pkgconf \
                libftdi1-dev libftdi1-static \
                libusb-dev \
                eudev-dev \
                zlib-dev zlib-static \
                hidapi-dev \
                linux-headers \
                argp-standalone

              # Copy source (avoid modifying the mounted checkout)
              cp -a /src /work/rp1-jtag

              # Build and install PIOLib (provides /dev/pio0 hardware access)
              git clone --depth 1 https://github.com/raspberrypi/utils.git /work/rpi-utils
              cmake -B /work/rpi-utils/piolib/build /work/rpi-utils/piolib \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON
              cmake --build /work/rpi-utils/piolib/build --parallel
              cmake --install /work/rpi-utils/piolib/build

              # Build and install librp1jtag (with PIOLib support)
              cmake -B /work/rp1-jtag/build /work/rp1-jtag \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr
              cmake --build /work/rp1-jtag/build --parallel
              cmake --install /work/rp1-jtag/build

              # Clone and patch openFPGALoader
              git clone --depth 1 https://github.com/trabucayre/openFPGALoader.git /work/openFPGALoader
              python3 /work/rp1-jtag/drivers/openfpgaloader/integrate.py /work/openFPGALoader

              # Force static linking:
              # 1. Remove libftdi1 cmake config which hardcodes
              #    /usr/lib/libusb-1.0.so in LIBFTDI_LIBRARIES.
              #    This forces openFPGALoader to fall back to pkg-config.
              rm -rf /usr/lib/cmake/libftdi1
              # 2. Remove all .so files so the linker can only find .a
              for lib in libftdi1 libusb-1.0 libudev libhidapi-hidraw \
                         libhidapi-libusb librp1jtag libpio; do
                rm -f /usr/lib/${lib}.so /usr/lib/${lib}.so.*
              done

              # Build openFPGALoader (static)
              cmake -B /work/openFPGALoader/build -S /work/openFPGALoader \
                -DCMAKE_BUILD_TYPE=Release \
                -DENABLE_RP1_PIO=ON \
                -DCMAKE_EXE_LINKER_FLAGS="-static"
              cmake --build /work/openFPGALoader/build --parallel

              # Verify and copy out
              file /work/openFPGALoader/build/openFPGALoader
              file /work/openFPGALoader/build/openFPGALoader | grep -qE "statically linked|static-pie linked"
              cp /work/openFPGALoader/build/openFPGALoader /src/openFPGALoader
            '

      - name: Upload static binary
        uses: actions/upload-artifact@v4
        with:
          name: static-openfpgaloader-arm64
          path: openFPGALoader

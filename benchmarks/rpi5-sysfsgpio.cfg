# OpenOCD sysfsgpio config for RPi 5 + NeTV2
# RPi 5 RP1 GPIO: gpiochip571 (base 571), BCM N = sysfs 571+N
#
# SPDX-License-Identifier: Apache-2.0

adapter driver sysfsgpio
transport select jtag

# BCM GPIO -> sysfs number (gpiochip571 base)
# TCK = BCM 4  -> 575
# TMS = BCM 17 -> 588
# TDI = BCM 27 -> 598
# TDO = BCM 22 -> 593
sysfsgpio_tck_num  575
sysfsgpio_tms_num  588
sysfsgpio_tdi_num  598
sysfsgpio_tdo_num  593

# sysfsgpio on RPi 5 is very slow (each toggle is a sysfs write through
# RP1 PCIe). The requested speed is a hint; actual speed will be much
# lower due to kernel/PCIe overhead.
adapter speed 1000
